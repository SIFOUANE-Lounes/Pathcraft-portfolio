version: "3.8"

services:

  poll:
    build: ./poll
    ports:
      - "5000:80"     
    environment:

      REDIS_HOST: redis
    depends_on:
      - redis
    networks:

      - poll-tier

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - poll-tier
      - back-tier

  worker:
    build: ./worker
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: db
      POSTGRES_DB: votes
      POSTGRES_USER: postgres
      

      POSTGRES_PASSWORD: postgres
      POSTGRES_PORT: 5432
    depends_on:
      - redis
      - db
    networks:
      - back-tier
  db:



    image: postgres:16-alpine
    environment:
      POSTGRES_DB: votes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - db-data:/var/lib/postgresql/data
    networks:
      - result-tier
      - back-tier

  result:
    build: ./result
    ports:
      - "5001:80"
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: votes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@db:5432/votes
    depends_on:
      - db
    networks:
      - result-tier







networks:
  poll-tier:
  result-tier:
  back-tier:
volumes:
  db-data: