services:
  db:
    image: postgres:15
    container_name: etnair_db
    restart: always
    environment:
      POSTGRES_USER: etnair_user
      POSTGRES_PASSWORD: etnair_pass
      POSTGRES_DB: etnair_db
    volumes:
      - etnair_db_data:/var/lib/postgresql/data
    networks:
      - etnair_network

  back:
    build: ./back/api
    container_name: etnair_api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: etnair_user
      DB_PASSWORD: etnair_pass
      DB_NAME: etnair_db
    depends_on:
      - db
    networks:
      - etnair_network

  front:
    build: ./front
    container_name: etnair_front
    ports:
      - "8080:80"
    networks:
      - etnair_network

networks:
  etnair_network:
    driver: bridge

volumes:
  etnair_db_data:
